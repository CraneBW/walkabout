name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install Python Dependencies
        run: pip install pyinstaller .[gui]

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name walkabout-linux \
            --onefile \
            --add-data "frontend/dist:frontend/dist" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            walkabout/__main__.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/walkabout-linux
          body: |
            ## Walkabout v${{ github.ref_name }}

            Interactive code walkthrough editor — write, run, replay.

            ### Linux
            - Download `walkabout-linux`
            - Install system dependencies: `sudo apt install libwebkit2gtk-4.1-dev libgtk-3-dev` (Debian/Ubuntu) or `sudo pacman -S webkit2gtk gtk3` (Arch)
            - Run: `chmod +x walkabout-linux && ./walkabout-linux`

            ### Windows
            - Download `walkabout.exe`
            - No extra dependencies (Edge WebView2 is built into Windows 10+)
            - Double-click to run

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install pyinstaller .[gui]

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name walkabout `
            --onefile `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            walkabout/__main__.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/walkabout.exe
