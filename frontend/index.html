<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walkabout</title>
    <script>
      // Prevent flash of wrong theme before React loads
      (function() {
        try {
          var theme = 'dark';
          try { var stored = localStorage.getItem('walkabout_theme'); if (stored) theme = stored; } catch(e) {}
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {}
      })();
    </script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: { fontCache: 'global' },
        startup: {
          pageReady: function() {
            // After MathJax is loaded, set up MutationObserver to catch
            // dynamically rendered content (TraceViewer steps, etc.)
            var root = document.getElementById('root');
            if (root) {
              var observer = new MutationObserver(function() {
                if (MathJax.typesetPromise) {
                  MathJax.typesetPromise().catch(function(){});
                }
              });
              observer.observe(root, { childList: true, subtree: true });
            }
            return MathJax.startup.defaultPageReady();
          }
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
      // Polling fallback: retry typeset every 1s until MathJax is ready
      (function() {
        var retries = 0;
        var timer = setInterval(function() {
          if (window.MathJax && window.MathJax.typesetPromise) {
            clearInterval(timer);
            MathJax.typesetPromise().catch(function(){});
          }
          if (++retries > 30) clearInterval(timer);
        }, 1000);
      })();
    </script>
  </head>
  <body>
    <div id="root"><div style="padding:40px;text-align:center;color:#888;font-family:sans-serif">Loading Walkabout...</div></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var root = document.getElementById('root');
        var stack = (err && err.stack) ? err.stack.replace(/</g,'&lt;') : '';
        var message = (err && err.message) ? err.message : String(msg);
        var name = (err && err.name) ? err.name : 'Error';
        root.innerHTML = '<div style="padding:40px;color:#e0556a;font-family:monospace;font-size:13px;background:#1a1b1e;min-height:100vh"><h3 style="color:#e0556a">' +
          name + '</h3><p style="color:#f48771;font-size:14px;margin:8px 0"><strong>' +
          message.replace(/</g,'&lt;') +
          '</strong></p><pre style="white-space:pre-wrap;margin-top:12px;color:#888">' +
          stack +
          '</pre><p style="margin-top:20px;color:#888">If you see this, React failed to load.</p></div>';
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
