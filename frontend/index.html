<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walkabout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Prevent flash of wrong theme before React loads
      (function() {
        var theme = localStorage.getItem('walkabout_theme') || 'dark';
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: { fontCache: 'global' },
        startup: {
          pageReady: function() {
            // After MathJax is loaded, set up MutationObserver to catch
            // dynamically rendered content (TraceViewer steps, etc.)
            var root = document.getElementById('root');
            if (root) {
              var observer = new MutationObserver(function() {
                if (MathJax.typesetPromise) {
                  MathJax.typesetPromise().catch(function(){});
                }
              });
              observer.observe(root, { childList: true, subtree: true });
            }
            return MathJax.startup.defaultPageReady();
          }
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
      // Polling fallback: retry typeset every 1s until MathJax is ready
      (function() {
        var retries = 0;
        var timer = setInterval(function() {
          if (window.MathJax && window.MathJax.typesetPromise) {
            clearInterval(timer);
            MathJax.typesetPromise().catch(function(){});
          }
          if (++retries > 30) clearInterval(timer);
        }, 1000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
